[project]
site_name = "just-bashit"
site_description = "shfmt-conformant, bats-tested, shellcheck-linted bash tools, templates, and more."
site_author = "Matthew T Hunter"
site_url = "https://just-buildit.github.io/just-bashit/"
copyright = "Copyright &copy; 2024 Matthew T Hunter"

extra_css = ["stylesheets/extra.css"]

nav = [
  {"Home" = "index.md"},
  {"Getting Started" = "getting-started.md"},
  {"Libraries" = [
    {"datetime" = "libraries/datetime.md"},
    {"environment" = "libraries/environment.md"},
    {"file" = "libraries/file.md"},
    {"format" = "libraries/format.md"},
    {"logging" = "libraries/logging.md"},
    {"match" = "libraries/match.md"},
    {"network" = "libraries/network.md"},
    {"path" = "libraries/path.md"},
    {"pkg" = "libraries/pkg.md"},
    {"toml" = "libraries/toml.md"},
  ]},
  {"Templates" = "templates.md"},
  {"jb" = "jb.md"},
  {"just-runit" = "just-runit.md"},
  {"install-deps" = "install-deps.md"},
  {"inspect" = "inspect.md"},
  {"Release" = "release.md"},
]

[project.theme]
language = "en"
logo = "assets/logo.svg"
favicon = "assets/logo.svg"
features = [
  "content.code.copy",
  "content.code.select",
  "navigation.footer",
  "navigation.indexes",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
