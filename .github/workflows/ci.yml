name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-22.04
    container:
      image: kcov/kcov:latest

    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            ca-certificates make git shellcheck bats

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run tests with coverage
        run: make test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: test-results/coverage/bats.*/cobertura.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: test-results/coverage/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: just-bashit
          path: just-bashit.tar.gz

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: shellcheck (SARIF → Code Scanning)
        run: |
          shellcheck --format=sarif src/*.sh > shellcheck.sarif || true
          python3 -c "import json; json.load(open('shellcheck.sarif'))" \
            2>/dev/null || printf '%s\n' \
            '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"shellcheck","rules":[]}},"results":[]}]}' \
            > shellcheck.sarif

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: shellcheck.sarif

  deploy-docs:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install zensical

      - run: zensical build --clean

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: site/coverage

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment

  release:
    needs: [test, lint]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: just-bashit

      - name: Read version
        id: ver
        run: |
          VER=$(grep 'PACKAGE: just-bashit version' src/datetime.sh \
                | grep -oP '\d+\.\d+\.\d+')
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="v${{ steps.ver.outputs.version }}"
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          if gh release view "${VER}" >/dev/null 2>&1; then
            TAG="${VER}-${SHORT}"
          else
            TAG="${VER}"
          fi
          gh release create "${TAG}" just-bashit.tar.gz \
            --title "just-bashit ${TAG}" \
            --notes "Automated release from commit ${{ github.sha }}."
