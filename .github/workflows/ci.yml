name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: test (${{ matrix.distro }})
    runs-on: ubuntu-22.04
    container:
      image: ${{ matrix.image }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            image: debian:latest
            primary: 'true'
          - distro: arch
            image: archlinux:latest
            primary: 'false'
          - distro: fedora
            image: fedora:latest
            primary: 'false'
          - distro: alpine
            image: alpine:latest
            primary: 'false'

    steps:
      - name: Install dependencies (debian)
        if: matrix.distro == 'debian'
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            ca-certificates make git bats curl

      - name: Install dependencies (arch)
        if: matrix.distro == 'arch'
        run: pacman -Sy --noconfirm --needed git make diffutils bats curl

      - name: Install dependencies (fedora)
        if: matrix.distro == 'fedora'
        run: dnf install -y git make diffutils bats curl

      - name: Install dependencies (alpine)
        if: matrix.distro == 'alpine'
        shell: sh
        run: |
          apk add --update --no-cache \
            bash git make bats coreutils curl diffutils

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run tests
        run: make test

      - name: Upload test report XML
        if: matrix.primary == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-report-xml
          path: test-results/*.xml

      - name: Upload release artifact
        if: matrix.primary == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: just-bashit
          path: just-bashit.tar.gz

  test-macos:
    name: test (macos)
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Install dependencies
        run: brew install bash coreutils diffutils bats-core

      - name: Export GNU utilities to PATH
        run: |
          echo "$(brew --prefix coreutils)/libexec/gnubin" >> "$GITHUB_PATH"
          echo "$(brew --prefix bash)/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run tests
        run: make test

  test-windows:
    name: test (windows/ucrt64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: git make diffutils curl

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run tests
        run: make test

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    container:
      image: kcov/kcov:latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            bats curl git make ca-certificates

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run tests with kcov
        run: |
          mkdir -p test-results/coverage
          kcov \
            --include-pattern=/src \
            --exclude-pattern=/test \
            --dump-summary \
            test-results/coverage \
            bats test 2>/dev/null

      - name: Generate coverage badge JSON
        run: |
          XML=$(find test-results/coverage -name cobertura.xml | head -1)
          RATE=$(grep -oP 'line-rate="\K[^"]+' "${XML}" | head -1)
          PCT=$(awk "BEGIN { printf \"%d\", ${RATE} * 100 }")
          if   [ "${PCT}" -ge 90 ]; then COLOR="brightgreen"
          elif [ "${PCT}" -ge 75 ]; then COLOR="green"
          elif [ "${PCT}" -ge 60 ]; then COLOR="yellowgreen"
          elif [ "${PCT}" -ge 40 ]; then COLOR="yellow"
          else COLOR="red"
          fi
          printf '{"schemaVersion":1,"label":"coverage","message":"%d%%","color":"%s"}\n' \
            "${PCT}" "${COLOR}" > test-results/coverage/coverage-badge.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: test-results/coverage/

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: shellcheck (SARIF → Code Scanning)
        run: |
          shellcheck --format=sarif src/*.sh > shellcheck.sarif || true
          python3 -c "import json; json.load(open('shellcheck.sarif'))" \
            2>/dev/null || printf '%s\n' \
            '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"shellcheck","rules":[]}},"results":[]}]}' \
            > shellcheck.sarif

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: shellcheck.sarif

  deploy-docs:
    needs: [coverage, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install zensical junit2html junitparser

      - run: zensical build --clean

      - name: Download test report XML
        uses: actions/download-artifact@v4
        with:
          name: test-report-xml
          path: test-report-xml

      - name: Generate test report HTML
        run: |
          python3 - <<'PYEOF'
          import glob
          from junitparser import JUnitXml
          xml = JUnitXml()
          for f in sorted(glob.glob('test-report-xml/*.xml')):
              xml += JUnitXml.fromfile(f)
          xml.write('test-report-xml/merged.xml')
          PYEOF
          mkdir -p site/test-report
          junit2html test-report-xml/merged.xml site/test-report/index.html

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: site/coverage

      - name: Move badge JSON to site root
        run: mv site/coverage/coverage-badge.json site/coverage-badge.json || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment

  release:
    needs: [test, test-macos, test-windows, lint]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: just-bashit

      - name: Read version
        id: ver
        run: |
          VER=$(grep 'PACKAGE: just-bashit version' src/datetime.sh \
                | grep -oP '\d+\.\d+\.\d+')
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="v${{ steps.ver.outputs.version }}"
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          if gh release view "${VER}" >/dev/null 2>&1; then
            TAG="${VER}-${SHORT}"
          else
            TAG="${VER}"
          fi
          gh release create "${TAG}" just-bashit.tar.gz \
            --title "just-bashit ${TAG}" \
            --notes "Automated release from commit ${{ github.sha }}."
