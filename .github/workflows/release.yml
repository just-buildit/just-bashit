name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Gate: wait for the CI run on this tagged commit to turn green.
  # Tags should only be pushed via `make tag-release` which verifies HEAD
  # is at origin/main — so CI has already run, we just wait for it to finish.
  verify-ci:
    name: Verify CI already passed for this commit
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - name: Require green CI for the tagged SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          for i in $(seq 1 60); do
            runs="$(gh api "repos/$REPO/commits/$SHA/check-runs" --paginate \
              --jq '.check_runs[] | select(.name == "CI passed")
                    | "\(.status) \(.conclusion)"' | head -n1)"
            status="${runs%% *}"
            conclusion="${runs#* }"
            if [[ -z "$status" ]]; then
              echo "No 'CI passed' check yet ($i/60); waiting..."
            elif [[ "$status" != "completed" ]]; then
              echo "'CI passed' is $status ($i/60); waiting..."
            elif [[ "$conclusion" == "success" ]]; then
              echo "'CI passed' is green — proceeding to release."
              exit 0
            else
              echo "::error::'CI passed' concluded '$conclusion' — refusing release."
              exit 1
            fi
            sleep 20
          done
          echo "::error::Timed out waiting for 'CI passed' on $SHA."
          exit 1

  build:
    needs: verify-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Build wheel + tarball
        run: |
          PYTHONPATH=src uv build --wheel --no-build-isolation
          tar -czf just-bashit.tar.gz src/just_bashit/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: just-bashit.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tarball

      - name: Extract changelog section
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v ver="$VER" \
            'index($0, "## [" ver "]") == 1 {found=1; next}
             found && /^## / {exit}
             found {print}' CHANGELOG.md > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" just-bashit.tar.gz \
            --title "just-bashit ${GITHUB_REF_NAME}" \
            --latest \
            --notes-file release-notes.md
