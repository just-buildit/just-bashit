<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="#0d1117"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="200" height="42" rx="32" fill="#161b22"/>
  <rect x="0" y="22" width="200" height="20" fill="#161b22"/>

  <!-- Traffic light dots -->
  <circle cx="36" cy="21" r="7" fill="#ff5f57"/>
  <circle cx="58" cy="21" r="7" fill="#ffbd2e"/>
  <circle cx="80" cy="21" r="7" fill="#28c840"/>

  <!-- Prompt: amber $ then white jb -->
  <text
    x="28" y="133"
    font-family="'Courier New', Courier, monospace"
    font-size="46"
    font-weight="bold"
  >
    <tspan fill="#f59e0b">$ </tspan><tspan fill="#ffffff">jb</tspan>
  </text>

  <!-- Cursor block -->
  <rect x="144" y="96" width="26" height="40" rx="3" fill="#f59e0b" opacity="0.85"/>

</svg>
